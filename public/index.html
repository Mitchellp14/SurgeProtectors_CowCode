<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Cow: Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #348C31;
            --background-color: #F0F2F5;
            --card-bg: #FFFFFF;
            --text-main: #282828;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-image: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.7)), url('644895289_dd3eef1f90_o_upscayl_3x_upscayl-standard-4x.png');
            background-size: 100% auto;
            background-color: var(--background-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: 50px;
        }

        /* Top App Bar */
        .app-bar {
            background-color: var(--primary);
            color: white;
            padding: 15px 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-bar h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 500;
        }

        .header-btn {
            background-color: white;
            color: var(--primary);
            margin: 0;
            padding: 8px 16px;
            width: auto;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .header-btn:hover {
            background-color: #f0f0f0;
            transform: scale(1.035);
        }

        .header-btn:active {
            transform: scale(0.955);
        }

        /* Layout Container */
        .container {
            max-width: 1000px;
            margin: 60px auto 20px auto;
            padding: 0 15px;
        }

        /* Card Component */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 20px;
            margin-bottom: 20px;
        }

        /* Form Controls Styling */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            align-items: end;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
        }

        /* Includes time input from index.html */
        select,
        input[type="date"],
        input[type="time"],
        input[type="text"],
        button {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            background: #fff;
            box-sizing: border-box;
        }

        button {
            background-color: var(--primary);
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #194218;
        }

        /* Graph Containers */
        .graph-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        /* Grid for multi graphs */
        #multiGraphGrid {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .small-graph {
            height: 200px;
        }

        /* Data Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #f8f9fa;
            color: #555;
            font-weight: 600;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        /* --- ANIMATIONS --- */
        .slide-transition {
            max-height: 100px;
            opacity: 1;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slide-hidden {
            max-height: 0;
            opacity: 0;
            margin: 0;
            padding: 0;
        }

        .graph-fade {
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .graph-visible {
            opacity: 1;
            transform: translateY(0);
        }

        #applyFilter,
        #connectBtn, #setupBtn {
            transition: transform 0.15s, background-color 0.15s;
        }

        #applyFilter:hover,
        #connectBtn:hover, #setupBtn:hover {
            transform: scale(1.02);
        }

        #applyFilter:active,
        #connectBtn:active, #setupBtn:active {
            transform: scale(0.975);
        }

        /* --- TOOLTIP STYLES --- */
        .tooltip-container {
            position: relative;
            display: inline-block;
            margin-left: 6px;
            cursor: help;
        }

        .info-icon {
            background: #bbb;
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            font-family: serif;
            transition: background 0.2s;
        }

        .tooltip-container:hover .info-icon {
            background: var(--primary);
        }

        .tooltip-text {
            visibility: hidden;
            opacity: 0;
            width: 200px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 8px 10px;
            position: absolute;
            z-index: 10;
            bottom: 135%;
            left: 50%;
            margin-left: -100px;
            transition: opacity 0.3s;
            font-size: 0.8rem;
            font-weight: normal;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.15);
        }

        .tooltip-container:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>

<body>

    <div class="app-bar">
        <h1>Project Cow: Live Monitor</h1>
        <!-- <button id="setupBtn" onclick="window.location.href='setup.html'" class="header-btn">Setup</button> -->
    </div>

    <div class="container">

        <!-- User ID / Connect card (from index.html) -->
        <div class="card">
            <div class="controls-grid" style="grid-template-columns: 1fr auto;">
                <div>
                    <label>User ID
                        <div class="tooltip-container">
                            <div class="info-icon">i</div>
                            <span class="tooltip-text">Enter your Firebase User ID to load that specific portion of the
                                data.</span>
                        </div>
                    </label>
                    <input type="text" id="userIdInput" placeholder="e.g. d7qH2bn6eLVEhkprSDApEc3RdFQ2">
                </div>
                <div>
                    <button id="connectBtn">Connect to Database</button>
                </div>
            </div>
        </div>

        <!-- Filters card -->
        <div class="card">
            <div class="controls-grid">

                <div>
                    <label>Select Cow (RFID)
                        <div class="tooltip-container">
                            <div class="info-icon">i</div>
                            <span class="tooltip-text">Chooses the specific cow based on the RFID tag number.</span>
                        </div>
                    </label>
                    <select id="cowSelect">
                        <option value="">Loading cows...</option>
                    </select>
                </div>

                <div>
                    <label>Filter Date
                        <div class="tooltip-container">
                            <div class="info-icon">i</div>
                            <span class="tooltip-text">Filters out a specified day.</span>
                        </div>
                    </label>
                    <input type="date" id="dateFilter">
                </div>

                <!-- Start/End Time filters (from index.html) -->
                <div>
                    <label>Start Time
                        <div class="tooltip-container">
                            <div class="info-icon">i</div>
                            <span class="tooltip-text">Show data recorded AT or AFTER this time.</span>
                        </div>
                    </label>
                    <input type="time" id="startTimeFilter">
                </div>

                <div>
                    <label>End Time
                        <div class="tooltip-container">
                            <div class="info-icon">i</div>
                            <span class="tooltip-text">Show data recorded AT or BEFORE this time.</span>
                        </div>
                    </label>
                    <input type="time" id="endTimeFilter">
                </div>

                <div>
                    <label>View Mode
                        <div class="tooltip-container">
                            <div class="info-icon">i</div>
                            <span class="tooltip-text">Switch views between a single graph or a view of all
                                metrics.</span>
                        </div>
                    </label>
                    <select id="viewMode">
                        <option value="single">Single Focused Graph</option>
                        <option value="multi">Dashboard (All Metrics)</option>
                    </select>
                </div>

                <!-- Metric selector includes feed weight & cattle weight (from index(1).html) -->
                <div id="metricSelectContainer" class="slide-transition">
                    <label>Graph Metric</label>
                    <select id="graphField">
                        <option value="temperature">Temperature</option>
                        <option value="humidity">Humidity</option>
                        <option value="methane">Methane</option>
                        <option value="co2">CO₂</option>
                        <option value="feed weight">Feed Weight</option>
                        <option value="cattle weight">Cattle Weight</option>
                    </select>
                </div>

                <div>
                    <button id="applyFilter">Update View</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 style="margin-top:0;">Analytics</h2>

            <div id="singleGraphContainer" class="graph-container">
                <canvas id="mainChart"></canvas>
            </div>

            <!-- Multi-graph grid includes all 6 canvases (from index(1).html) -->
            <div id="multiGraphGrid">
                <div class="small-graph"><canvas id="chartTemp"></canvas></div>
                <div class="small-graph"><canvas id="chartHum"></canvas></div>
                <div class="small-graph"><canvas id="chartMeth"></canvas></div>
                <div class="small-graph"><canvas id="chartCo2"></canvas></div>
                <div class="small-graph"><canvas id="chartFeed"></canvas></div>
                <div class="small-graph"><canvas id="chartCow"></canvas></div>
            </div>
        </div>

        <div class="card">
            <h2 style="margin-top:0;">Detailed Logs</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Temp (°C)</th>
                            <th>Humidity (%)</th>
                            <th>Methane (ppm)</th>
                            <th>CO₂ (ppm)</th>
                            <!-- Extra columns from index(1).html -->
                            <th>Feed Weight (kg)</th>
                            <th>Cattle Weight (kg)</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="7">No data loaded.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
